name: Liber Architect Agent
on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'What do you want to write about today?'
        required: true
        default: 'The future of AI in 2026'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install pydantic-ai groq pydantic

      - name: Run Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python agents/architect_engine.py "${{ github.event.inputs.topic }}"

      - name: Commit and Push
        run: |
          git config --local user.email "liber-bot@github.com"
          git config --local user.name "Liber Agent"
          git add latest_outline.md
          git commit -m "New Outline: ${{ github.event.inputs.topic }}" || echo "No changes"
          git push
