<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liber - The Living Folio</title>
    <style>
        body { font-family: 'Georgia', serif; background-color: #f9f9f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; max-width: 600px; padding: 40px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #333; font-weight: normal; }
        textarea { width: 100%; height: 100px; padding: 15px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; margin-top: 20px; resize: none; }
        button { margin-top: 20px; padding: 12px 30px; background-color: #333; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hi Writer,</h1>
        <p>What do you want to write about today?</p>
        <textarea id="topic" placeholder="Describe your 5,000-word masterpiece..."></textarea>
        <br>
        <button onclick="triggerArchitect()">Generate Foundation</button>
        <p id="status" style="margin-top: 20px; font-style: italic; color: #888;"></p>
    </div>

    <script>
    async function triggerArchitect() {
        const topic = document.getElementById('topic').value;
        const status = document.getElementById('status');
        
        // Use a prompt to ask for the token (Safest way for a simple HTML build)
        const token = prompt("Please enter your Liber Access Token to proceed:");

        if (!token) return;

        status.innerText = "Liber is waking up the Architect...";

        const url = "https://api.github.com/repos/xai-baba/Liber-the-Living-Folio/actions/workflows/architect.yml/dispatches";
        
        try {
            const response = await fetch(url, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${token}`,
                    "Accept": "application/vnd.github+json",
                    "X-GitHub-Api-Version": "2022-11-28"
                },
                body: JSON.stringify({
                    ref: "main", // Your branch
                    inputs: { topic: topic }
                })
            });

            if (response.ok) {
                status.innerText = "Success! The Architect has started building. Check back in 1 minute.";
                status.style.color = "green";
            } else {
                const errorData = await response.json();
                status.innerText = "Error: " + (errorData.message || "Could not start.");
                status.style.color = "red";
            }
        } catch (err) {
            status.innerText = "Connection failed.";
            status.style.color = "red";
        }
    }
</script>
</body>
</html>
